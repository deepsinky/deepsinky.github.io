<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeepSINKY </title>

<style>

body{
margin:0;
font-family:Arial;
background:#202123;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#171717;
padding:15px;
}

.sidebar h2{
font-size:18px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
border-bottom:1px solid #333;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
padding:10px 15px;
margin:10px 0;
border-radius:10px;
max-width:70%;
}

.user{
background:#444;
margin-left:auto;
}

.bot{
background:#333;
}

.input-area{
display:flex;
padding:15px;
background:#202123;
}

input{
flex:1;
padding:15px;
border-radius:25px;
border:none;
background:#40414f;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:25px;
background:#19c37d;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>DeepSINKY</h2>

<p>+ New Chat</p>

</div>

<div class="main">

<div class="header">

DeepSINKY 

</div>

<div class="chat" id="chat">

</div>

<div class="input-area">

<input id="input" placeholder="Ask anything">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function send(){

let input = document.getElementById("input")

let text = input.value

if(text==="") return

let chat = document.getElementById("chat")

chat.innerHTML += `<div class="message user">${text}</div>`

chat.innerHTML += `<div class="message bot">Thinking...</div>`

input.value=""

chat.scrollTop = chat.scrollHeight

}

</script>

</body>

</html>
